name: Backend

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # CI — install dependencies and verify imports compile cleanly
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Verify app loads
        run: python -c "import app.main"
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost/dummy"
          SECRET_KEY: "ci-secret-key"

  # ─────────────────────────────────────────────────────────────
  # CD — rsync repo to EC2, docker compose up --build.
  #
  # Secrets live in Settings → Environments → prod:
  #   EC2_HOST       — public IP / hostname of the EC2 instance
  #   EC2_USER       — SSH user (e.g. ubuntu)
  #   EC2_SSH_KEY    — private key (PEM contents)
  #   DATABASE_URL   — e.g. postgresql://user:pass@host/db
  #   SECRET_KEY     — app secret key
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment directory on VM
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "mkdir -p ~/invapp/backend"

      - name: Copy repo to VM
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key" \
            . ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/invapp/backend/

      - name: Deploy backend
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cd ~/invapp/backend && \
             printf 'DATABASE_URL=%s\nSECRET_KEY=%s\n' \
               '${{ secrets.DATABASE_URL }}' \
               '${{ secrets.SECRET_KEY }}' > .env && \
             chmod 600 .env && \
             docker compose down --remove-orphans || true && \
             docker compose up --build -d && \
             docker image prune -f"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
